
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Infinity Quest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800;900&family=Lato:wght@100;300;400;700;900&display=swap');
      
      body {
        font-family: 'Lato', sans-serif;
        background-color: #020617;
        color: #e2e8f0;
        overflow: hidden;
      }
      
      h1, h2, h3, h4, h5, h6, .fantasy-font {
        font-family: 'Cinzel', serif;
        letter-spacing: 0.05em;
      }

      /* Custom scrollbar for webkit */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
      ::-webkit-scrollbar-thumb {
        background: #1e293b; 
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #334155; 
      }

      /* Rarity Styles */
      .rarity-common { border-color: #475569; }
      .rarity-uncommon { border-color: #10b981; color: #6ee7b7; box-shadow: 0 0 5px rgba(16, 185, 129, 0.1); }
      .rarity-rare { border-color: #3b82f6; color: #93c5fd; box-shadow: 0 0 10px rgba(59, 130, 246, 0.2); }
      .rarity-epic { border-color: #a855f7; color: #d8b4fe; box-shadow: 0 0 15px rgba(168, 85, 247, 0.3); }
      .rarity-legendary { 
        border-color: #f59e0b; 
        color: #fcd34d; 
        box-shadow: 0 0 20px rgba(245, 158, 11, 0.4); 
        animation: pulse-legendary 3s infinite ease-in-out; 
      }

      @keyframes pulse-legendary {
        0%, 100% { box-shadow: 0 0 15px rgba(245, 158, 11, 0.3); border-color: #d97706; }
        50% { box-shadow: 0 0 30px rgba(245, 158, 11, 0.7); border-color: #fbbf24; }
      }

      @keyframes float-up {
        0% { transform: translateY(0) scale(1); opacity: 1; }
        100% { transform: translateY(-50px) scale(1.1); opacity: 0; }
      }

      .animate-float-up {
        animation: float-up 1.5s ease-out forwards;
      }

      @keyframes spin-slow {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      .animate-spin-slow {
        animation: spin-slow 20s linear infinite;
      }

      @keyframes soundwave {
        0%, 100% { height: 4px; }
        50% { height: 12px; }
      }

      .typewriter::after {
        content: '|';
        animation: blink 1s step-start infinite;
      }
      
      @keyframes blink {
        50% { opacity: 0; }
      }

      /* Transitions */
      .fade-enter { opacity: 0; }
      .fade-enter-active { opacity: 1; transition: opacity 500ms ease-in; }
    </style>

}
